coverage:
  status:
    project:
      frontend:
        target: 70%
        flags: ["frontend"]
      backend:
        target: 70%
        flags: ["backend"]

flags:
  frontend:
    paths:
      - "src/"
    carryforward: true
  backend:
    paths:
      - "backend/"
    carryforward: true

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: true