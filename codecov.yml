codecov:
  require_ci_to_pass: yes

coverage:
  precision: 2
  round: down
  range: "70...100"
  status:
    project:
      default:
        enabled: no
      frontend:
        target: 70%
        flags:
          - frontend
      backend:
        target: 70%
        flags:
          - backend

flags:
  frontend:
    paths:
      - src/
    carryforward: false
  backend:
    paths:
      - backend/
    carryforward: false

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: true